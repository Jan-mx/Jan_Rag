name: jan_rag

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: jan-rag-postgres
    environment:
      POSTGRES_DB: jan_rag
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d jan_rag"]
      interval: 10s
      timeout: 5s
      retries: 10

  elasticsearch:
    build:
      context: .
      dockerfile: docker/elasticsearch/Dockerfile
    container_name: jan-rag-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      http.cors.enabled: "true"
      http.cors.allow-origin: "http://localhost:8088"
      http.cors.allow-headers: "X-Requested-With,Content-Type,Content-Length,Authorization"
    ports:
      - "19200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: jan-rag-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: jan-rag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 20

  ollama-model-init:
    image: ollama/ollama:latest
    container_name: jan-rag-ollama-model-init
    entrypoint: ["/bin/sh", "-c", "until ollama list >/dev/null 2>&1; do sleep 2; done; ollama pull ${OLLAMA_EMBEDDING_MODEL:-qllama/bge-small-zh-v1.5}"]
    environment:
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy

  backend:
    build:
      context: ./backend
    container_name: jan-rag-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      ELASTICSEARCH_HOST: ${ELASTICSEARCH_HOST}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
    ports:
      - "18080:3000"
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_healthy
      ollama-model-init:
        condition: service_completed_successfully

  frontend:
    image: node:22-alpine
    container_name: jan-rag-frontend
    working_dir: /workspace/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
      VITE_DEV_PROXY_TARGET: ${VITE_DEV_PROXY_TARGET:-http://backend:3000}
    ports:
      - "5173:5173"
    volumes:
      - ./:/workspace
      - frontend-node-modules:/workspace/frontend/node_modules
    depends_on:
      - backend

  elasticvue:
    image: cars10/elasticvue:latest
    container_name: jan-rag-elasticvue
    ports:
      - "8088:8080"
    depends_on:
      elasticsearch:
        condition: service_healthy

volumes:
  postgres-data:
    external: true
    name: jan_rag_postgres-data
  elasticsearch-data:
    external: true
    name: jan_rag_elasticsearch-data
  minio-data:
    external: true
    name: jan_rag_minio-data
  ollama-data:
    external: true
    name: jan_rag_ollama-data
  frontend-node-modules:



