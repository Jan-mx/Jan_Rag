<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Jan Assistant preview</title>
  <desc id="desc">A GitHub README preview image showing Jan Assistant sessions, streaming chat, knowledge-base mode, citations, and session context.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#111111" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="#F6F7F9"/>
  <rect x="56" y="48" width="1088" height="624" rx="26" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="56" y="48" width="1088" height="624" rx="26" stroke="#D8DDE3"/>

  <text x="94" y="102" fill="#111111" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="800">Jan Assistant</text>
  <text x="94" y="130" fill="#6B7280" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">CHAT and KB_SEARCH stream through the same Assistant workspace.</text>
  <rect x="938" y="78" width="142" height="38" rx="8" fill="#111111"/>
  <text x="965" y="102" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">New Session</text>

  <rect x="94" y="166" width="244" height="454" rx="14" fill="#F9FAFB" stroke="#D8DDE3"/>
  <text x="120" y="205" fill="#111111" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="800">Sessions</text>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="120" y="232" width="192" height="72" rx="10" fill="#111111"/>
    <text x="140" y="261" fill="#FFFFFF" font-size="14" font-weight="700">Release review</text>
    <text x="140" y="282" fill="#A7A7A7" font-size="12">KB_SEARCH · citations</text>
    <rect x="120" y="320" width="192" height="72" rx="10" fill="#FFFFFF" stroke="#D8DDE3"/>
    <text x="140" y="349" fill="#111111" font-size="14" font-weight="700">Architecture notes</text>
    <text x="140" y="370" fill="#6B7280" font-size="12">CHAT · compact summary</text>
    <rect x="120" y="408" width="192" height="72" rx="10" fill="#FFFFFF" stroke="#D8DDE3"/>
    <text x="140" y="437" fill="#111111" font-size="14" font-weight="700">Ops checklist</text>
    <text x="140" y="458" fill="#6B7280" font-size="12">CHAT · recovered</text>
  </g>

  <rect x="370" y="166" width="500" height="454" rx="14" fill="#FFFFFF" stroke="#D8DDE3"/>
  <rect x="370" y="166" width="500" height="64" rx="14" fill="#111111"/>
  <path d="M370 216H870" stroke="#111111"/>
  <text x="398" y="205" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="800">Release review</text>
  <rect x="722" y="184" width="112" height="28" rx="14" fill="#FFFFFF"/>
  <text x="742" y="203" fill="#111111" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="800">KB_SEARCH</text>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="398" y="260" width="332" height="74" rx="14" fill="#F3F4F6"/>
    <text x="420" y="288" fill="#111111" font-size="14" font-weight="700">User</text>
    <text x="420" y="312" fill="#374151" font-size="14">How does document ingestion work?</text>

    <rect x="490" y="362" width="330" height="122" rx="14" fill="#111111"/>
    <text x="512" y="390" fill="#FFFFFF" font-size="14" font-weight="700">Assistant</text>
    <text x="512" y="414" fill="#E5E7EB" font-size="14">Files are stored in MinIO, parsed,</text>
    <text x="512" y="437" fill="#E5E7EB" font-size="14">chunked, embedded, and indexed.</text>
    <text x="512" y="460" fill="#A7A7A7" font-size="13">Streaming delta...</text>

    <rect x="512" y="506" width="86" height="28" rx="14" fill="#DCFCE7"/>
    <text x="531" y="525" fill="#166534" font-size="12" font-weight="800">citation 1</text>
    <rect x="610" y="506" width="86" height="28" rx="14" fill="#DBEAFE"/>
    <text x="629" y="525" fill="#1D4ED8" font-size="12" font-weight="800">citation 2</text>

    <rect x="398" y="554" width="424" height="42" rx="10" fill="#F9FAFB" stroke="#D8DDE3"/>
    <text x="420" y="581" fill="#6B7280" font-size="13">Ask a follow-up in the selected knowledge space...</text>
  </g>

  <rect x="902" y="166" width="196" height="454" rx="14" fill="#F9FAFB" stroke="#D8DDE3"/>
  <text x="928" y="205" fill="#111111" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="800">Context</text>
  <rect x="928" y="234" width="144" height="92" rx="10" fill="#FFFFFF" stroke="#D8DDE3"/>
  <text x="948" y="263" fill="#111111" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="800">Session memory</text>
  <rect x="948" y="282" width="96" height="8" rx="4" fill="#D1D5DB"/>
  <rect x="948" y="300" width="112" height="8" rx="4" fill="#D1D5DB"/>

  <rect x="928" y="350" width="144" height="92" rx="10" fill="#FFFFFF" stroke="#D8DDE3"/>
  <text x="948" y="379" fill="#111111" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="800">Compact summary</text>
  <rect x="948" y="398" width="104" height="8" rx="4" fill="#D1D5DB"/>
  <rect x="948" y="416" width="78" height="8" rx="4" fill="#D1D5DB"/>

  <rect x="928" y="466" width="144" height="92" rx="10" fill="#111111"/>
  <text x="948" y="495" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="800">SSE events</text>
  <text x="948" y="519" fill="#A7A7A7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">start</text>
  <text x="992" y="519" fill="#A7A7A7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">delta</text>
  <text x="948" y="540" fill="#A7A7A7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">done / error</text>
</svg>
